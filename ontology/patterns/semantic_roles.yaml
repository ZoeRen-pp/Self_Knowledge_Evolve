# Semantic role classification patterns for Stage 2 segmentation.
# Each role has one or more regex patterns (case-insensitive).
# First match wins — order by priority (most specific first).

roles:
  - type: definition
    patterns:
      - '\b(is defined as|refers to|is a type of|means that|definition of)\b'
      - '\b(header format|field.{0,20}(?:contain|indicate|specif))\b'
      - '\b(data unit|segment format|datagram format|packet format)\b'
      - '\+-+-\+-\+|[\+\-]{5,}\+'   # ASCII diagrams in RFCs

  - type: mechanism
    patterns:
      - '\b(works by|mechanism|algorithm|process of|how it)\b'
      - '\b(state machine|handshake|retransmit|acknowledgment|three.way)\b'
      - '\b(sliding window|flow control|congestion|encapsulat|multiplexing)\b'
      - '\b(demultiplexing|reassembly|fragmentation)\b'

  - type: constraint
    patterns:
      - '\b(must|shall|required|mandatory|limitation|constraint|not allowed)\b'
      - '\b(must not|shall not)\b'

  - type: config
    patterns:
      - '\b(configure|configuration|set the|enable|disable|command)\b'

  - type: fault
    patterns:
      - '\b(fault|failure|error|alarm|down state|outage|flap)\b'
      - '\b(reset|abort|refuse|reject|timeout)\b'

  - type: troubleshooting
    patterns:
      - '\b(troubleshoot|debug|diagnose|verify|check the log)\b'

  - type: best_practice
    patterns:
      - '\b(best practice|recommendation|suggested|advised|tip)\b'
      - '\b(security consideration)\b'

  - type: performance
    patterns:
      - '\b(performance|throughput|latency|bandwidth|packet loss|delay)\b'
      - '\b(maximum segment size|MSS|window size|round.trip|RTT)\b'
      - '\b(retransmission timeout|RTO|timer)\b'

  - type: comparison
    patterns:
      - '\b(compared to|versus|vs\.|difference between|unlike)\b'

  - type: table
    flags: MULTILINE
    patterns:
      - '^(\s*\|.+\|)'

  - type: code
    flags: MULTILINE
    patterns:
      - '(```|^    \S)'

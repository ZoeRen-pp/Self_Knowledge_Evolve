  canonical_name: QueueScheduling
  display_name_zh: 队列调度
  knowledge_layer: mechanism
  maturity_level: core
  lifecycle_state: active
  description: 'Queue scheduling: PQ/WFQ/CBWFQ/LLQ algorithms control bandwidth allocation across priority queues, ensuring

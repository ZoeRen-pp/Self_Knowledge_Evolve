domain: IP / Data Communication Network
knowledge_layer: mechanism
version: v0.2.0
nodes:
- id: MECH.LinkStateFlooding
  canonical_name: LinkStateFlooding
  display_name_zh: 链路状态泛洪
  knowledge_layer: mechanism
  maturity_level: core
  lifecycle_state: active
  description: 'Link-state flooding: OSPF/IS-IS routers advertise link-state information (LSA/LSP) to all nodes in the flooding
    domain, building a synchronized topology database (LSDB). 链路状态路由协议（OSPF/IS-IS）中，每台路由器将自身链路状态信息泛洪 到整个区域，使所有节点获得一致的全局拓扑视图。'
  aliases:
  - link state flooding
  - LSA flooding
  - link-state advertisement flood
  allowed_relations:
  - participates_in
  - explains
  - implemented_by
  - depends_on
  - causes
- id: MECH.PathVectorPropagation
  canonical_name: PathVectorPropagation
  display_name_zh: 路径矢量传播
  knowledge_layer: mechanism
  maturity_level: core
  lifecycle_state: active
  description: 'Path vector propagation: BGP carries the full AS-Path with each route update, enabling loop detection (reject
    routes containing own AS) and policy-based path selection. BGP 使用的路由信息传播机制：每条路由携带完整的 AS-Path，防止路由环路， 并使接收方可根据路径属性做策略决策。'
  aliases:
  - path vector propagation
  - BGP route propagation
  - AS-path propagation
  allowed_relations:
  - participates_in
  - explains
  - implemented_by
  - depends_on
- id: MECH.BestPathSelection
  canonical_name: BestPathSelection
  display_name_zh: 最优路径选择
  knowledge_layer: mechanism
  maturity_level: core
  lifecycle_state: active
  description: 'BGP best-path selection: decision process comparing Weight > LocalPref > AS-Path length > Origin > MED > eBGP/iBGP
    > IGP metric to select the optimal route for installation. BGP 按 Weight → LocalPref → AS-Path 长度 → Origin → MED → eBGP/iBGP
    → IGP Metric 等属性依次比较，选出最优路由安装到路由表。'
  aliases:
  - best path selection
  - BGP best path
  - route selection algorithm
  - 最优路由选择
  allowed_relations:
  - participates_in
  - explains
  - implemented_by
  - depends_on
  - causes
- id: MECH.RecursiveNextHopResolution
  canonical_name: RecursiveNextHopResolution
  display_name_zh: 递归下一跳解析
  knowledge_layer: mechanism
  maturity_level: core
  lifecycle_state: active
  description: 'Recursive next-hop resolution: BGP next-hop addresses are resolved through IGP routing table lookup to find
    a directly connected egress; unreachable next-hops prevent route installation. BGP 路由的 next-hop 地址需通过 IGP 递归查表解析为直连出口，
    next-hop 不可达时路由不会被安装。'
  aliases:
  - recursive next hop
  - next-hop resolution
  - 递归下一跳
  allowed_relations:
  - participates_in
  - explains
  - depends_on
- id: MECH.ECMPSelection
  canonical_name: ECMPSelection
  display_name_zh: 等价多路径选择
  knowledge_layer: mechanism
  maturity_level: core
  lifecycle_state: active
  description: 'Equal-Cost Multi-Path (ECMP): when multiple equal-cost routes exist, the router forwards traffic across all
    paths simultaneously using hash-based or round-robin distribution. 当存在多条等价路径时，路由器可同时使用多条路径进行负载分担， 提升带宽利用率并提供一定冗余。'
  aliases:
  - ECMP
  - equal-cost multipath
  - 等价多路径
  allowed_relations:
  - participates_in
  - explains
  - implemented_by
- id: MECH.RouteRedistribution
  canonical_name: RouteRedistribution
  display_name_zh: 路由重分布
  knowledge_layer: mechanism
  maturity_level: core
  lifecycle_state: active
  description: 'Route redistribution: the `redistribute` command on an ASBR injects routes
    from one routing protocol (e.g. OSPF, IS-IS, connected, static) into another (e.g. BGP),
    with a route-map filter and metric/tag rewrite at the protocol boundary. Typical CLI:
    `redistribute connected|static|ospf|bgp route-map <NAME>`. Mutual redistribution between
    two IGPs requires loop prevention via administrative distance or route tags. 在 ASBR
    上通过 redistribute 命令把协议 A（OSPF/IS-IS/直连/静态）的路由注入协议 B（如 BGP），
    在协议边界用 route-map 过滤并改写 metric/tag；双向互导时需用 AD 或 route tag 防环。'
  aliases:
  - route redistribution
  - route import
  - 路由引入
  - 路由重分发
  allowed_relations:
  - participates_in
  - explains
  - implemented_by
  - risky_under
- id: MECH.DefaultRoutePropagation
  canonical_name: DefaultRoutePropagation
  display_name_zh: 默认路由传播
  knowledge_layer: mechanism
  maturity_level: core
  lifecycle_state: active
  description: 'Default route propagation: border router injects or advertises 0.0.0.0/0 default route into the internal network,
    directing traffic to the exit when no more specific route exists. 边界路由器向内网注入或传播 0.0.0.0/0 默认路由，使内网设备在无更精确路由时 将流量导向出口。'
  aliases:
  - default route propagation
  - default route injection
  - 默认路由下发
  allowed_relations:
  - participates_in
  - explains
  - implemented_by
- id: MECH.LongestPrefixMatch
  canonical_name: LongestPrefixMatch
  display_name_zh: 最长前缀匹配
  knowledge_layer: mechanism
  maturity_level: core
  lifecycle_state: active
  description: 'Longest Prefix Match (LPM): routing table lookup algorithm that selects the most specific prefix (longest
    netmask) when multiple routes match a destination IP address. 路由查表时优先使用掩码最长（最精确）的路由条目转发报文。'
  aliases:
  - longest prefix match
  - LPM
  - 最长掩码匹配
  allowed_relations:
  - participates_in
  - explains
  - implemented_by
- id: MECH.LabelSwitching
  canonical_name: LabelSwitching
  display_name_zh: 标签交换
  knowledge_layer: mechanism
  maturity_level: core
  lifecycle_state: active
  description: 'MPLS label switching: data plane mechanism where forwarding devices perform Pop/Swap/Push operations based
    on packet labels via LFIB lookup, bypassing IP routing table. MPLS 数据平面核心机制：转发设备根据报文携带的标签查 LFIB 完成 Pop/Swap/Push 操作，无需查
    IP 路由表。'
  aliases:
  - label switching
  - MPLS forwarding
  - 标签转发
  allowed_relations:
  - participates_in
  - explains
  - implemented_by
  - depends_on
- id: MECH.EncapsulationDecapsulation
  canonical_name: EncapsulationDecapsulation
  display_name_zh: 封装与解封装
  knowledge_layer: mechanism
  maturity_level: core
  lifecycle_state: active
  description: 'Tunnel encapsulation/decapsulation: overlay technologies (VXLAN/GRE/IPsec) add or remove outer headers when
    packets enter or exit tunnels. Overlay 技术（VXLAN/GRE/IPsec）在报文进出隧道时添加或去除外层报头的机制。'
  aliases:
  - encapsulation decapsulation
  - tunnel encap decap
  - 封装解封装
  allowed_relations:
  - participates_in
  - explains
  - implemented_by
- id: MECH.VxlanOverlayForwarding
  canonical_name: VxlanOverlayForwarding
  display_name_zh: VXLAN Overlay 转发
  knowledge_layer: mechanism
  maturity_level: core
  lifecycle_state: active
  description: 'VXLAN overlay forwarding: VTEP encapsulates L2 frames into UDP/IP for transport over L3 underlay, enabling
    L2 overlay connectivity across routed networks with multi-tenant isolation. VTEP 将二层帧封装进 UDP/IP 后通过 Underlay 转发，实现跨三层网络的
    二层 Overlay 互联，支持大规模多租户隔离。'
  aliases:
  - VXLAN overlay forwarding
  - VTEP forwarding
  - overlay forwarding
  allowed_relations:
  - participates_in
  - explains
  - implemented_by
  - depends_on
- id: MECH.PolicyBasedForwarding
  canonical_name: PolicyBasedForwarding
  display_name_zh: 策略转发
  knowledge_layer: mechanism
  maturity_level: core
  lifecycle_state: active
  description: 'Policy-based routing (PBR): forwarding decisions based on ACL/flow classification rather than destination
    address, used for exit selection, traffic steering, and service chaining. 根据 ACL/流分类结果而非目的地址决定转发路径，用于实现出口选路、 流量绕行、业务链等。'
  aliases:
  - policy based forwarding
  - PBR
  - policy-based routing
  - 策略路由
  allowed_relations:
  - participates_in
  - explains
  - implemented_by
- id: MECH.FirstHopRedundancy
  canonical_name: FirstHopRedundancy
  display_name_zh: 首跳冗余
  knowledge_layer: mechanism
  maturity_level: core
  lifecycle_state: active
  description: 'First Hop Redundancy Protocol (FHRP): multiple gateway devices present a single virtual IP to hosts; backup
    takes over on primary failure. Implementations: VRRP, HSRP, Anycast Gateway. 多台网关设备虚拟为单一 IP 网关，主设备故障时备设备接管， 终端无需感知。典型实现：VRRP、HSRP、Anycast
    Gateway。'
  aliases:
  - first hop redundancy
  - FHRP
  - gateway redundancy
  - 网关冗余
  allowed_relations:
  - participates_in
  - explains
  - implemented_by
- id: MECH.FastFailureDetection
  canonical_name: FastFailureDetection
  display_name_zh: 快速故障检测
  knowledge_layer: mechanism
  maturity_level: core
  lifecycle_state: active
  description: 'Fast failure detection: lightweight probing mechanisms like BFD detect link or neighbor failures in milliseconds,
    triggering rapid routing protocol convergence. 利用 BFD 等轻量级探测机制在毫秒级感知链路或邻居故障， 触发路由协议快速收敛。'
  aliases:
  - fast failure detection
  - BFD detection
  - 快速检测
  - 亚秒级故障检测
  allowed_relations:
  - participates_in
  - explains
  - implemented_by
- id: MECH.PrimaryBackupSwitchover
  canonical_name: PrimaryBackupSwitchover
  display_name_zh: 主备切换
  knowledge_layer: mechanism
  maturity_level: core
  lifecycle_state: active
  description: 'Primary-backup switchover: traffic automatically shifts to pre-configured backup path/device when the primary
    fails; switchover time depends on detection mechanism and preemption policy. 主路径或主设备故障后，流量自动切换到预先配置的备用路径或备设备， 切换时间由检测机制和抢占策略共同决定。'
  aliases:
  - primary backup switchover
  - failover
  - active standby switchover
  - 主备倒换
  - 故障切换
  allowed_relations:
  - participates_in
  - explains
  - implemented_by
  - depends_on
- id: MECH.LoadSharing
  canonical_name: LoadSharing
  display_name_zh: 负载分担
  knowledge_layer: mechanism
  maturity_level: core
  lifecycle_state: active
  description: 'Load sharing: distributing traffic across multiple parallel links or paths using hash-based or round-robin
    algorithms for bandwidth utilization and redundancy. 多条并行链路或路径同时承载流量，按 hash 或 round-robin 分配。'
  aliases:
  - load sharing
  - load balancing
  - 负载均衡
  allowed_relations:
  - participates_in
  - explains

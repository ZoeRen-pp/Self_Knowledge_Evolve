- id: MECH.VRFIsolation
  canonical_name: VRFIsolation
  display_name_zh: VRF 隔离
  knowledge_layer: mechanism
  maturity_level: core
  lifecycle_state: active
  description: 'VRF isolation: creating multiple independent routing tables (VRF instances) on a single router for L3 tenant/service
    isolation with completely separate routing and forwarding planes. 在同一台路由器上创建多个独立路由表（VRF），实现不同租户或业务的 三层隔离，路由和转发完全独立。'
  aliases:
  - VRF isolation
  - VRF-based isolation
  - 虚拟路由转发隔离
  allowed_relations:
  - participates_in
  - explains
  - implemented_by
- id: MECH.RouteTargetBasedIsolation
  canonical_name: RouteTargetBasedIsolation
  display_name_zh: Route Target 隔离
  knowledge_layer: mechanism
  maturity_level: core
  lifecycle_state: active
  description: 'Route Target (RT) based isolation: MPLS L3VPN controls VPN route visibility scope through RT import/export
    policies, enabling fine-grained multi-tenant isolation and selective interconnection. MPLS L3VPN 中通过 RT（Route Target）的
    import/export 策略控制 VPN 路由的可见范围，实现精细化多租户隔离与互通。'
  aliases:
  - route target isolation
  - RT-based isolation
  - route target import export
  - 路由目标隔离
  allowed_relations:
  - participates_in
  - explains
  - implemented_by
- id: MECH.OverlayTenantIsolation
  canonical_name: OverlayTenantIsolation
  display_name_zh: Overlay 租户隔离
  knowledge_layer: mechanism
  maturity_level: core
  lifecycle_state: active
  description: 'Overlay tenant isolation: EVPN/VXLAN isolates different tenants using VNI and EVI, with shared underlay infrastructure

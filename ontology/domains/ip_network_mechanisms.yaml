  canonical_name: ClassificationMarking
  display_name_zh: 流量分类与标记
  knowledge_layer: mechanism
  maturity_level: core
  lifecycle_state: active
  description: 'Traffic classification and marking: identifying traffic at ingress using ACL/DSCP/802.1p criteria and applying

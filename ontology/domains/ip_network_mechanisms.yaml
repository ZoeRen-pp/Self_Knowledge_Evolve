- id: MECH.ReflectionAndReAdvertisement
  canonical_name: ReflectionAndReAdvertisement
  display_name_zh: 路由反射与重播
  knowledge_layer: mechanism
  maturity_level: core
  lifecycle_state: active
  description: 'BGP route reflection: Route Reflector (RR) re-advertises iBGP-learned routes to other iBGP peers (clients),
    eliminating the need for full-mesh iBGP sessions. BGP RR 将从 iBGP 客户端收到的路由反射给其他客户端，解决 iBGP 全互联 扩展性问题。'
  aliases:
  - route reflection
  - RR reflection
  - BGP route reflector
  - 路由反射
  allowed_relations:
  - participates_in
  - explains
  - implemented_by
- id: MECH.RouteImportExport
  canonical_name: RouteImportExport
  display_name_zh: 路由导入导出
  knowledge_layer: mechanism
  maturity_level: core
  lifecycle_state: active
  description: 'VPN route import/export: PE routers export local VRF routes as VPNv4/VPNv6 with RD, and other PEs import matching
    routes based on RT policy for cross-site VPN distribution. VPN 路由在 PE 上通过 RD 标识后导出为 VPNv4/VPNv6 路由， 其他 PE 按 RT 策略导入对应
    VRF，完成 VPN 路由跨站点分发。'
  aliases:
  - route import export
  - VPN route distribution
  - VPNv4 advertisement
  - 路由导入导出
  allowed_relations:
  - participates_in
  - explains
  - implemented_by
  - depends_on

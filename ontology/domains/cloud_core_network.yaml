version: v0.4.0
domain: 5G Cloud Core Network
domain_id: CN5G

nodes:

  # ════════════════════════════════════════════
  # 1. CONTROL PLANE — Access & Mobility
  # ════════════════════════════════════════════
  - id: CN5G.ACCESS_MOBILITY
    canonical_name: Access and Mobility Management
    display_name_zh: 接入与移动性管理
    parent_id: null
    maturity_level: core
    description: Category grouping 5GC control-plane NFs responsible for UE access, registration, and mobility management
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [contains, depends_on, configured_by]

  - id: CN5G.AMF
    canonical_name: AMF
    display_name_zh: 接入和移动性管理功能
    parent_id: CN5G.ACCESS_MOBILITY
    maturity_level: core
    description: >
      Access and Mobility Management Function. Terminates N1 (NAS) and N2 (NG-AP) interfaces;
      handles UE registration, connection management, reachability, mobility; relays SM messages
      between UE and SMF; performs access authentication and authorization via AUSF.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, communicates_with, uses_protocol, selects]

  - id: CN5G.AUSF
    canonical_name: AUSF
    display_name_zh: 鉴权服务功能
    parent_id: CN5G.ACCESS_MOBILITY
    maturity_level: core
    description: >
      Authentication Server Function. Executes 5G-AKA and EAP-AKA' authentication procedures;
      acts as EAP server; interfaces UDM/ARPF for authentication vector retrieval via N13.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, communicates_with, authenticates]

  - id: CN5G.NSSF
    canonical_name: NSSF
    display_name_zh: 网络切片选择功能
    parent_id: CN5G.ACCESS_MOBILITY
    maturity_level: core
    description: >
      Network Slice Selection Function. Determines Allowed NSSAI and the AMF set for serving
      the UE; maps S-NSSAI to network slice instance (NSI).
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, communicates_with, selects]

  - id: CN5G.SMSF
    canonical_name: SMSF
    display_name_zh: 短消息功能
    parent_id: CN5G.ACCESS_MOBILITY
    maturity_level: core
    description: >
      SMS Function. Supports SMS over NAS transport for 5G; receives SMS from UE via AMF;
      interworks with SMS-GMSC/IWMSC for delivery.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, communicates_with]

  - id: CN5G.LMF
    canonical_name: LMF
    display_name_zh: 位置管理功能
    parent_id: CN5G.ACCESS_MOBILITY
    maturity_level: core
    description: >
      Location Management Function. Determines UE location using positioning methods
      (GNSS, OTDOA, E-CID); supports emergency, commercial, and regulatory location services.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, communicates_with]

  - id: CN5G.5G_EIR
    canonical_name: 5G-EIR
    display_name_zh: 5G设备标识寄存器
    parent_id: CN5G.ACCESS_MOBILITY
    maturity_level: core
    description: >
      5G Equipment Identity Register. Checks mobile equipment identity (PEI/IMEI) status;
      determines whether equipment is permitted, barred, or under observation.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, communicates_with]

  # ════════════════════════════════════════════
  # 2. CONTROL PLANE — Session Management
  # ════════════════════════════════════════════
  - id: CN5G.SESSION_MANAGEMENT
    canonical_name: Session Management
    display_name_zh: 会话管理
    parent_id: null
    maturity_level: core
    description: Category grouping 5GC NFs responsible for PDU session lifecycle, QoS, and user plane control
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [contains, depends_on, configured_by]

  - id: CN5G.SMF
    canonical_name: SMF
    display_name_zh: 会话管理功能
    parent_id: CN5G.SESSION_MANAGEMENT
    maturity_level: core
    description: >
      Session Management Function. PDU session establishment/modification/release; UPF selection;
      IP address allocation; QoS flow management; installs PFCP rules in UPF via N4;
      obtains PCC rules from PCF via N7.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, communicates_with, controls, selects]

  - id: CN5G.UPF
    canonical_name: UPF
    display_name_zh: 用户面功能
    parent_id: CN5G.SESSION_MANAGEMENT
    maturity_level: core
    description: >
      User Plane Function. Packet routing and forwarding; GTP-U tunnel termination on N3/N9;
      QoS enforcement; uplink traffic classification (UL CL); PDU Session Anchor (PSA)
      for DN connectivity; DL packet buffering; controlled by SMF via N4/PFCP.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, communicates_with, forwards_via, terminates_on]

  - id: CN5G.CHF
    canonical_name: CHF
    display_name_zh: 计费功能
    parent_id: CN5G.SESSION_MANAGEMENT
    maturity_level: core
    description: >
      Charging Function. Provides converged online/offline charging; exposes
      Nchf_SpendingLimitControl and Nchf_ConvergedCharging services; used by SMF for
      PDU session charging.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, communicates_with]

  # ════════════════════════════════════════════
  # 3. CONTROL PLANE — Data & Policy
  # ════════════════════════════════════════════
  - id: CN5G.DATA_POLICY
    canonical_name: Data Management and Policy Control
    display_name_zh: 数据管理与策略控制
    parent_id: null
    maturity_level: core
    description: Category grouping 5GC NFs for subscription data, policy decisions, and data storage
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [contains, depends_on, configured_by]

  - id: CN5G.UDM
    canonical_name: UDM
    display_name_zh: 统一数据管理
    parent_id: CN5G.DATA_POLICY
    maturity_level: core
    description: >
      Unified Data Management. Manages subscription data and authentication credentials (via ARPF);
      generates 3GPP AKA credentials; SUPI de-concealment (SIDF); stores data in UDR.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, communicates_with, stores_in]

  - id: CN5G.UDR
    canonical_name: UDR
    display_name_zh: 统一数据仓库
    parent_id: CN5G.DATA_POLICY
    maturity_level: core
    description: >
      Unified Data Repository. Backend store for subscription data, policy data, structured
      exposure data, and application data; accessed by UDM, PCF, NEF.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, communicates_with, stores_in]

  - id: CN5G.PCF
    canonical_name: PCF
    display_name_zh: 策略控制功能
    parent_id: CN5G.DATA_POLICY
    maturity_level: core
    description: >
      Policy Control Function. Unified policy framework; provides PCC rules to SMF (N7)
      and access/mobility policies to AMF (N15); successor to 4G PCRF;
      supports UE policy delivery.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, communicates_with, enforces]

  - id: CN5G.UDSF
    canonical_name: UDSF
    display_name_zh: 非结��化数据存储功能
    parent_id: CN5G.DATA_POLICY
    maturity_level: core
    description: >
      Unstructured Data Storage Function. Key-value store for NF session state;
      enables AMF/SMF/PCF to be stateless by externalizing context data.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, communicates_with, stores_in]

  # ════════════════════════════════════════════
  # 4. SBA INFRASTRUCTURE
  # ════════════════════════════════════════════
  - id: CN5G.SBA_INFRA
    canonical_name: Service-Based Architecture Infrastructure
    display_name_zh: 服务化架构基础设施
    parent_id: null
    maturity_level: core
    description: Category grouping SBA support NFs for service discovery, routing, exposure, and analytics
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [contains, depends_on, configured_by]

  - id: CN5G.NRF
    canonical_name: NRF
    display_name_zh: 网络存储功能
    parent_id: CN5G.SBA_INFRA
    maturity_level: core
    description: >
      Network Repository Function. NF profile registration, storage, and discovery;
      NF status notification; enables dynamic SBA by allowing NFs to locate each other.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, communicates_with, registers]

  - id: CN5G.SCP
    canonical_name: SCP
    display_name_zh: 服务通信代理
    parent_id: CN5G.SBA_INFRA
    maturity_level: core
    description: >
      Service Communication Proxy. Mediates SBI messages between NFs (indirect communication);
      provides load balancing, message routing, overload control, topology hiding;
      supports Communication Models C and D.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, communicates_with, routes]

  - id: CN5G.NEF
    canonical_name: NEF
    display_name_zh: 网络开放功能
    parent_id: CN5G.SBA_INFRA
    maturity_level: core
    description: >
      Network Exposure Function. Exposes 5GC capabilities and events to external AFs securely;
      translates internal/external information; stores/retrieves data from UDR.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, communicates_with, exposes]

  - id: CN5G.NWDAF
    canonical_name: NWDAF
    display_name_zh: 网络数据分析功能
    parent_id: CN5G.SBA_INFRA
    maturity_level: core
    description: >
      Network Data Analytics Function. Collects data from NFs and OAM; provides statistical
      and predictive analytics; contains AnLF (inference) and MTLF (model training);
      consumers include PCF, NSSF, AMF, SMF.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, communicates_with, analyzes]

  - id: CN5G.BSF
    canonical_name: BSF
    display_name_zh: 绑定支持功能
    parent_id: CN5G.SBA_INFRA
    maturity_level: core
    description: >
      Binding Support Function. Stores binding information between PCF instances and
      PDU sessions/UEs; enables AF/NEF to discover serving PCF for a given session.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, communicates_with, binds_to]

  # ════════════════════════════════════════════
  # 5. ROAMING & INTERWORKING
  # ════════════════════════════════════════════
  - id: CN5G.ROAMING_INTERWORK
    canonical_name: Roaming and Interworking
    display_name_zh: 漫游与互通
    parent_id: null
    maturity_level: core
    description: Category grouping NFs for inter-PLMN roaming, non-3GPP access, and 4G/5G interworking
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [contains, depends_on, configured_by]

  - id: CN5G.SEPP
    canonical_name: SEPP
    display_name_zh: 安全边缘保护代理
    parent_id: CN5G.ROAMING_INTERWORK
    maturity_level: core
    description: >
      Security Edge Protection Proxy. Secures inter-PLMN SBI signaling at roaming boundary;
      terminates N32 interface (N32-c handshake + N32-f message forwarding);
      provides topology hiding and message filtering.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, communicates_with, protects]

  - id: CN5G.N3IWF
    canonical_name: N3IWF
    display_name_zh: 非3GPP互通功能
    parent_id: CN5G.ROAMING_INTERWORK
    maturity_level: core
    description: >
      Non-3GPP InterWorking Function. Enables untrusted non-3GPP access (WiFi) to 5GC;
      UE establishes IPsec/IKEv2 tunnel to N3IWF; connects to AMF via N2 and UPF via N3.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, communicates_with, terminates_on]

  - id: CN5G.TNGF
    canonical_name: TNGF
    display_name_zh: 可信非3GPP网关功能
    parent_id: CN5G.ROAMING_INTERWORK
    maturity_level: core
    description: >
      Trusted Non-3GPP Gateway Function. Enables trusted WiFi/wired access to 5GC
      without IPsec tunnel; connects to AMF via N2 and UPF via N3.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, communicates_with, terminates_on]

  # ════════════════════════════════════════════
  # 6. REFERENCE POINT INTERFACES
  # ════════════════════════════════════════════
  - id: CN5G.INTERFACES
    canonical_name: 5GC Reference Point Interfaces
    display_name_zh: 5GC参考点接口
    parent_id: null
    maturity_level: core
    description: Category grouping key reference point interfaces between 5GC NFs and external entities
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [contains, depends_on]

  - id: CN5G.N1_INTERFACE
    canonical_name: N1 Interface
    display_name_zh: N1接口
    parent_id: CN5G.INTERFACES
    maturity_level: core
    description: >
      NAS signaling interface between UE and AMF. Carries registration, authentication,
      and PDU session management messages over N2/RAN transport.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, carries, terminates_on]

  - id: CN5G.N2_INTERFACE
    canonical_name: N2 Interface
    display_name_zh: N2接口
    parent_id: CN5G.INTERFACES
    maturity_level: core
    description: >
      NG-AP (SCTP) control-plane interface between RAN (gNB) and AMF.
      Carries UE context management, handover, and paging signaling.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, carries, terminates_on]

  - id: CN5G.N3_INTERFACE
    canonical_name: N3 Interface
    display_name_zh: N3接口
    parent_id: CN5G.INTERFACES
    maturity_level: core
    description: >
      GTP-U (UDP) user-plane interface between RAN (gNB) and UPF.
      Carries uplink/downlink user data in GTP-U tunnels.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, carries, terminates_on]

  - id: CN5G.N4_INTERFACE
    canonical_name: N4 Interface
    display_name_zh: N4接口
    parent_id: CN5G.INTERFACES
    maturity_level: core
    description: >
      PFCP (UDP) interface between SMF and UPF. SMF installs forwarding rules
      (PDR, FAR, QER, URR) in UPF to control packet processing and QoS enforcement.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, carries, terminates_on]

  - id: CN5G.N6_INTERFACE
    canonical_name: N6 Interface
    display_name_zh: N6接口
    parent_id: CN5G.INTERFACES
    maturity_level: core
    description: >
      IP/Ethernet interface between UPF and Data Network (DN).
      Provides connectivity to internet, enterprise DN, or IMS.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, carries, terminates_on]

  - id: CN5G.N9_INTERFACE
    canonical_name: N9 Interface
    display_name_zh: N9接口
    parent_id: CN5G.INTERFACES
    maturity_level: core
    description: >
      GTP-U (UDP) interface between UPFs (I-UPF to PSA UPF).
      Provides inter-UPF tunneling for multi-hop user-plane paths.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, carries, terminates_on]

  - id: CN5G.N32_INTERFACE
    canonical_name: N32 Interface
    display_name_zh: N32接口
    parent_id: CN5G.INTERFACES
    maturity_level: core
    description: >
      Inter-PLMN signaling interface between SEPPs. N32-c for TLS handshake,
      N32-f for SBI message forwarding with Application Level Security (ALS).
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, carries, terminates_on]

  # ═══════════════════════════════��════════════
  # 7. NETWORK SLICING
  # ════════════════════════════════════════════
  - id: CN5G.NETWORK_SLICING
    canonical_name: Network Slicing
    display_name_zh: 网络切片
    parent_id: null
    maturity_level: core
    description: Category grouping network slicing configurable objects and parameters
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [contains, depends_on, configured_by]

  - id: CN5G.S_NSSAI
    canonical_name: S-NSSAI
    display_name_zh: 单网络切片选择辅助信息
    parent_id: CN5G.NETWORK_SLICING
    maturity_level: core
    description: >
      Single Network Slice Selection Assistance Information. Composed of SST (Slice/Service Type,
      8-bit) and optional SD (Slice Differentiator, 24-bit). Identifies a specific network slice type.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, part_of, selects]

  - id: CN5G.NSI
    canonical_name: NSI
    display_name_zh: 网络切片实例
    parent_id: CN5G.NETWORK_SLICING
    maturity_level: core
    description: >
      Network Slice Instance. A set of NF instances and required network resources configured
      to serve a specific S-NSSAI. May have dedicated or shared NFs.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, contains, instantiated_as]

  - id: CN5G.NSSAI
    canonical_name: NSSAI
    display_name_zh: 网络切片选择辅助信息集合
    parent_id: CN5G.NETWORK_SLICING
    maturity_level: core
    description: >
      Collection of S-NSSAIs. UE can be served by up to 8 slices simultaneously.
      Types: Configured NSSAI, Requested NSSAI, Allowed NSSAI.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, contains]

  # ════════════════════════════════════════════
  # 8. QOS & SESSION OBJECTS
  # ════════════════════════════════════════════
  - id: CN5G.QOS_SESSION
    canonical_name: QoS and Session Objects
    display_name_zh: QoS与会话对象
    parent_id: null
    maturity_level: core
    description: Category grouping PDU session, QoS flow, and policy rule configurable objects
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [contains, depends_on, configured_by]

  - id: CN5G.PDU_SESSION
    canonical_name: PDU Session
    display_name_zh: PDU会话
    parent_id: CN5G.QOS_SESSION
    maturity_level: core
    description: >
      Protocol Data Unit Session. Logical connection between UE and Data Network;
      identified by PDU Session ID; types: IPv4, IPv6, IPv4v6, Ethernet, Unstructured.
      Contains one or more QoS Flows.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, contains, terminates_on]

  - id: CN5G.QOS_FLOW
    canonical_name: QoS Flow
    display_name_zh: QoS流
    parent_id: CN5G.QOS_SESSION
    maturity_level: core
    description: >
      Finest granularity of QoS differentiation in 5G (replaces 4G bearers). Identified by QFI;
      types: GBR, Non-GBR, Delay-Critical GBR; characterized by 5QI mapping to QoS parameters.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, part_of, maps_to]

  - id: CN5G.PCC_RULE
    canonical_name: PCC Rule
    display_name_zh: PCC规则
    parent_id: CN5G.QOS_SESSION
    maturity_level: core
    description: >
      Policy and Charging Control Rule. Provided by PCF to SMF via N7; contains service data
      flow filter, QoS parameters, charging key, gate status. SMF translates to PFCP rules.
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, enforces, maps_to]

  - id: CN5G.PFCP_SESSION
    canonical_name: PFCP Session
    display_name_zh: PFCP会话
    parent_id: CN5G.QOS_SESSION
    maturity_level: core
    description: >
      PFCP session established by SMF in UPF via N4. Contains forwarding rules:
      PDR (detection), FAR (forwarding action), QER (QoS enforcement), URR (usage reporting).
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP]
    allowed_relations: [depends_on, configured_by, contains, controls]

  # ════════════════════════════════════��═══════
  # 9. CLOUD-NATIVE INFRASTRUCTURE
  # ════════════════════════════════════════════
  - id: CN5G.CLOUD_NATIVE
    canonical_name: Cloud-Native Infrastructure
    display_name_zh: 云原生基础设施
    parent_id: null
    maturity_level: core
    description: Category grouping cloud-native deployment and orchestration objects for 5GC CNFs
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP, ETSI]
    allowed_relations: [contains, depends_on, configured_by]

  - id: CN5G.CNF
    canonical_name: CNF
    display_name_zh: 云原生网络功能
    parent_id: CN5G.CLOUD_NATIVE
    maturity_level: core
    description: >
      Cloud-Native Network Function. Containerized NF deployed as microservices on Kubernetes;
      pod-level scaling (seconds); stateless design with external state store (UDSF).
    lifecycle_state: active
    version_introduced: v0.4.0
    source_basis: [3GPP, ETSI]

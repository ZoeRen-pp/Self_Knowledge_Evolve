version: v0.1.0
relations:

  # ── Classification ─────────────────────────────────────────
  - id: is_a
    category: classification
    description: Inheritance or classification relationship
    domain_hint: any
    range_hint: any
    symmetric: false
    transitive: true

  - id: subclass_of
    category: classification
    description: Subclass relationship between ontology nodes
    domain_hint: OntologyNode
    range_hint: OntologyNode
    symmetric: false
    transitive: true

  - id: instance_of
    category: classification
    description: Instance membership in a class
    domain_hint: Entity
    range_hint: OntologyNode
    symmetric: false
    transitive: false

  - id: part_of
    category: classification
    description: Compositional membership
    domain_hint: any
    range_hint: any
    symmetric: false
    transitive: true

  - id: belongs_to_domain
    category: classification
    description: Concept belongs to a network domain
    domain_hint: Concept
    range_hint: OntologyNode
    symmetric: false
    transitive: false

  # ── Structural ─────────────────────────────────────────────
  - id: contains
    category: structural
    description: Container-contained relationship
    domain_hint: any
    range_hint: any
    symmetric: false
    transitive: true

  - id: connected_to
    category: structural
    description: Physical or logical link between objects
    domain_hint: any
    range_hint: any
    symmetric: true
    transitive: false

  - id: hosted_on
    category: structural
    description: Software/function hosted on hardware or platform
    domain_hint: any
    range_hint: any
    symmetric: false
    transitive: false

  - id: mounted_on
    category: structural
    description: Physical installation relationship
    domain_hint: any
    range_hint: any
    symmetric: false
    transitive: false

  - id: peers_with
    category: structural
    description: Peer relationship (e.g., BGP peers, LACP peers)
    domain_hint: any
    range_hint: any
    symmetric: true
    transitive: false

  - id: terminates_on
    category: structural
    description: Protocol or path terminates on a node
    domain_hint: any
    range_hint: any
    symmetric: false
    transitive: false

  # ── Functional ─────────────────────────────────────────────
  - id: uses_protocol
    category: functional
